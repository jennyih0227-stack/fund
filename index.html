<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1B2A4A">
<title>誠毅淨值日報</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="誠毅淨值">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A; --navy-2:#2E4A7A; --gold:#C9A84C; --gold-d:#A07830;
    --cream:#FAF6EE; --gray:#E8E0D0; --charcoal:#333; --ink:#12203c;
    --up:#D42F2F; --down:#00934B;
    --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    --serif:"Noto Serif TC",serif; --num:"Lato","Noto Sans TC",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--sans); color:var(--charcoal);
    background:var(--navy);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(46,74,122,.55), transparent 42%),
      radial-gradient(circle at 90% 8%, rgba(201,168,76,.10), transparent 40%);
    min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 4px) 0 calc(env(safe-area-inset-bottom) + 28px);
  }

  /* ---- Header ---- */
  header{
    max-width:560px; margin:0 auto; padding:18px 20px 14px;
    color:var(--cream);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-family:var(--serif); font-size:13px; letter-spacing:.14em;
  }
  .brand .cheng{color:var(--gold)}
  .brand .rule{flex:1; height:1px; background:linear-gradient(90deg,var(--gold-d),transparent)}
  h1{
    font-family:var(--serif); font-weight:700; font-size:30px;
    letter-spacing:.06em; margin-top:12px; color:var(--cream);
  }
  h1 .accent{color:var(--gold)}
  .meta{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:10px; font-size:12px; color:#b9c2d6;
  }
  .updated{display:flex; align-items:center; gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.2)}
  .refresh{
    font-family:var(--sans); font-size:12px; color:var(--gold);
    background:none;border:1px solid rgba(201,168,76,.4);border-radius:999px;
    padding:5px 12px; cursor:pointer; transition:.2s;
  }
  .refresh:active{background:rgba(201,168,76,.15)}
  .refresh.spin{opacity:.5;pointer-events:none}

  /* ---- Sheet ---- */
  main{
    max-width:560px; margin:14px auto 0; padding:0 12px;
  }
  .section{
    background:var(--cream); border-radius:16px; overflow:hidden;
    margin-bottom:14px; box-shadow:0 10px 30px -12px rgba(0,0,0,.45);
    border:1px solid rgba(201,168,76,.25);
  }
  .sec-head{
    display:flex; align-items:center; gap:9px;
    background:var(--navy); color:var(--cream);
    padding:11px 16px; font-weight:700; font-size:15px; letter-spacing:.04em;
    border-bottom:2px solid var(--gold);
  }
  .sec-head .ic{font-size:16px; filter:grayscale(.1)}
  .sec-head .cnt{
    margin-left:auto; font-family:var(--num); font-size:11px; font-weight:700;
    color:var(--gold); letter-spacing:.1em;
  }

  .row{
    display:grid; grid-template-columns:1fr auto auto;
    align-items:center; gap:10px;
    padding:13px 16px; border-bottom:1px solid var(--gray);
    text-decoration:none; color:inherit;
    transition:background .15s;
  }
  .row:last-child{border-bottom:none}
  .row:active{background:#f0e9db}
  .r-name{min-width:0}
  .r-name .nm{
    font-size:15px; font-weight:500; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .row.linkable .nm{color:var(--navy-2); text-decoration:underline; text-decoration-color:rgba(46,74,122,.3); text-underline-offset:3px}
  .r-name .dt{font-size:11px; color:#9a927f; margin-top:2px; font-family:var(--num)}
  .r-val{
    font-family:var(--num); font-weight:700; font-size:16px;
    text-align:right; white-space:nowrap;
  }
  .r-val .u{font-size:11px; font-weight:400; color:#8a8270; margin-left:2px}
  .r-pct{
    font-family:var(--num); font-weight:900; font-size:14px;
    text-align:right; white-space:nowrap; min-width:74px;
  }
  .up{color:var(--up)} .down{color:var(--down)} .flat{color:#8a8270}
  .r-pct .ar{font-size:11px; margin-right:1px}
  .na{color:#b6ae9a; font-family:var(--num); font-weight:400}

  /* ---- states ---- */
  .state{
    max-width:560px; margin:40px auto; padding:0 24px;
    color:var(--cream); text-align:center;
  }
  .state .big{font-family:var(--serif); font-size:20px; margin-bottom:8px}
  .state .sub{font-size:13px; color:#b9c2d6; line-height:1.7}
  .skeleton .section{background:rgba(250,246,238,.06); border-color:rgba(201,168,76,.12)}
  .skeleton .bar{height:14px;border-radius:4px;background:linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.14),rgba(255,255,255,.06));background-size:200% 100%;animation:sh 1.3s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .sk-row{display:grid;grid-template-columns:1fr 70px 60px;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05)}

  footer{
    max-width:560px; margin:22px auto 0; padding:0 20px; text-align:center;
    color:#8b95ab; font-size:11px; line-height:1.9;
  }
  footer .motto{color:var(--gold); font-family:var(--serif); letter-spacing:.2em; font-size:12px}
  footer .motto b{color:var(--gold)}
  footer .dis{margin-top:6px; color:#6c7690}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span><span class="cheng">誠毅</span>傳承</span>
    <span class="rule"></span>
    <span>熊誠毅</span>
  </div>
  <h1>淨值<span class="accent">日報</span></h1>
  <div class="meta">
    <span class="updated"><span class="dot"></span><span id="updated">載入中…</span></span>
    <button class="refresh" id="refreshBtn">重新整理</button>
  </div>
</header>

<main id="app">
  <div class="skeleton">
    <div class="section">
      <div class="sec-head" style="background:rgba(27,42,74,.6)"><div class="bar" style="width:120px"></div></div>
      <div class="sk-row"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <div class="sk-row"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      <div class="sk-row"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    </div>
  </div>
</main>

<footer>
  <div class="motto">誠於心・毅於行・傳於世・承於志</div>
  <div class="dis">資料每日自動更新，僅供參考，不構成投資建議</div>
</footer>

<script>
const $ = s => document.querySelector(s);

function fmtValue(it){
  const v = it.value;
  if(v === null || v === undefined) return '<span class="na">—</span>';
  const unit = it.unit || '';
  let num;
  if(unit === '點'){ num = Math.round(v).toLocaleString('en-US'); }
  else if(Math.abs(v) >= 1000){ num = Math.round(v).toLocaleString('en-US'); }
  else if(it.date !== undefined && it.date !== null){ // 基金淨值：多位小數
    num = v.toFixed(v < 100 ? 4 : 2);
  } else if(unit === '' && v < 100 && v > 0){ // 匯率
    num = v.toFixed(v < 1 ? 4 : 2);
  } else {
    num = v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  return num + (unit ? `<span class="u">${unit}</span>` : '');
}

function fmtPct(it){
  if(it.value === null || it.value === undefined || it.pct === null || it.pct === undefined)
    return '<span class="r-pct flat">—</span>';
  const p = it.pct;
  const cls = p > 0.0001 ? 'up' : (p < -0.0001 ? 'down' : 'flat');
  const ar = p > 0.0001 ? '▲' : (p < -0.0001 ? '▼' : '—');
  const sign = p > 0 ? '+' : '';
  return `<span class="r-pct ${cls}"><span class="ar">${ar}</span>${sign}${p.toFixed(2)}%</span>`;
}

function render(data){
  const app = $('#app');
  $('#updated').textContent = '更新於 ' + (data.updated_at || '—');
  if(!data.sections || !data.sections.length){
    app.innerHTML = ''; return;
  }
  let html = '';
  for(const sec of data.sections){
    if(!sec.items || !sec.items.length) continue;
    html += `<section class="section"><div class="sec-head"><span class="ic">${sec.icon||''}</span>${sec.title}<span class="cnt">${sec.items.length} 檔</span></div>`;
    for(const it of sec.items){
      const link = it.url && it.ok;
      const tag = link ? 'a' : 'div';
      const attrs = link ? `href="${it.url}" target="_blank" rel="noopener" class="row linkable"` : 'class="row"';
      html += `<${tag} ${attrs}>
        <div class="r-name">
          <div class="nm">${it.name}</div>
          ${it.date ? `<div class="dt">${it.date}</div>` : ''}
        </div>
        <div class="r-val">${fmtValue(it)}</div>
        ${fmtPct(it)}
      </${tag}>`;
    }
    html += `</section>`;
  }
  app.innerHTML = html;
}

async function load(bust){
  try{
    const url = 'data.json' + (bust ? ('?t=' + Date.now()) : '');
    const res = await fetch(url, {cache: bust ? 'no-store' : 'default'});
    if(!res.ok) throw new Error('no data');
    const data = await res.json();
    render(data);
  }catch(e){
    $('#app').innerHTML = `<div class="state">
      <div class="big">尚未有淨值資料</div>
      <div class="sub">首次部署後，請到 GitHub Actions 手動執行一次<br>「更新基金淨值」，或等待每日自動排程。</div>
    </div>`;
    $('#updated').textContent = '無資料';
  }
}

$('#refreshBtn').addEventListener('click', async () => {
  const b = $('#refreshBtn');
  b.classList.add('spin'); b.textContent = '更新中…';
  await load(true);
  b.classList.remove('spin'); b.textContent = '重新整理';
});

load(false);

// Service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
